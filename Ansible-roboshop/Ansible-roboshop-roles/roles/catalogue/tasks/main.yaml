- name: app set up
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: nodejs set up
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs.yaml

- name: systemd set up
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml

- name: Copy mongo repo
  ansible.builtin.copy:
    src: mongodb.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: check products loaded
  ansible.builtin.shell: >
    mongosh --host "{{ MONGODB_HOST }}" --quiet --eval
    "db.getMongo().getDBNames().indexOf('catalogue')"
  register: catalogue_output

- name: print the products
  ansible.builtin.debug:
    msg: "{{ catalogue_output }}"

- name: loading the products
  ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout | int < 0

- name: start or restarted catalogue
  ansible.builtin.service:
    name: catalogue
    state: restarted
    enabled: yes
