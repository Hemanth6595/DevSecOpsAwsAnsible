- name: creating ec2 intances And rout53 records
  hosts: all
  connection: local

  vars:
    sg_id: sg-0cc36aed8dd6406ca
    ami_id: ami-0220d79f3f480ecf5
    instances_env: dev
    ec2_intances_names: 
      - mongodb
      - catalogue
    domain_name: devsecopsaws88s.online

  tasks:
    - name: creating ec2 intances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}"
        tags: 
          Project: roboshop
          Component: "{{ item }}"
          Enviroment: "{{ instances_env }}"
          name: "{{ item }}-{{ instances_env }}"
      loop: "{{ ec2_intances_names }}"
      register: ec2_instances_output

    - name: print the ec2_instance_output
      ansible.builtin.debug:
        msg: "{{ ec2_instances_output }}"

    - name: create rout53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ instances_env }}.{{ domain_name }}" # mongodb-dev.devsecopsaws88s.online, frontend-dev.devsecopsaws88s.online
        type: A
        ttl: 1
        value: "{{item.instances[0].private_ip_address}}"
        wait: true
      loop: "{{ ec2_instances_output.results }}"

    - name: create rout53 records
      amazon.aws.route53:
          state: present
          zone: "{{ domain_name }}"
          record: "roboshop-{{ instances_env }}.{{ domain_name }}" # mongodb-dev.devsecopsaws88s.online, frontend-dev.devsecopsaws88s.online
          type: A
          ttl: 1
          value: "{{item.instances[0].public_ip_address}}"
          wait: true
      loop: "{{ ec2_instances_output.results }}"
      when: item.item == "frontend"
