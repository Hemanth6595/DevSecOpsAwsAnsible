- name: creating ec2 intances And rout53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0cc36aed8dd6406ca
    ami_id: ami-0220d79f3f480ecf5
    instancesenv: dev
    myec2intances: 
      - mongodb
      - catalogue
  tasks:
    - name: creating ec2 intances
      amazon.aws.ec2_instance:
       instance_type: t3.micro
       security_group: "{{ sg_id }}"
       image_id: "{{ ami_id }}"
       name: "{{ item }}"
       tags: 
        Project: roboshop
        Component: "{{ item }}"
        Enviroment: "{{ instancesenv }}"
        name: "{{ item }}-{{ instancesenv }}"
      loop: "{{ myec2intances }}"
      register: ec2_instance


    - name: ec2_instance_output
      ansible.builtin.debug:
        msg: "{{ ec2_instance }}"

