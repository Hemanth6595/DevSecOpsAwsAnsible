# ansible-playbook inventory -i localhost, -e "my_list="['mongodb','redis','mysql','user','rabbinq','catalogue','cart','shipping','payment','frontend']"roboshop.yaml
- name: creating ec2 intances And rout53 records
  hosts: all
  connection: local

  vars:
    sg_id: sg-0cc36aed8dd6406ca
    ami_id: ami-0220d79f3f480ecf5
    instances_env: dev
    ec2_intances_names: 
      - mongodb
      - mysql
      - redis
      - rabbitmq
      - catalogue
      - user
      - cart
      - shipping
      - payment
      - frontend
    domain_name: devsecopsaws88s.online
    action: create

  tasks:
    - name: creating ec2 intances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}"
        tags: 
          Project: roboshop
          Component: "{{ item }}"
          Enviroment: "{{ instances_env }}"
          name: "{{ item }}-{{ instances_env }}"
      loop: "{{ ec2_intances_names }}"
      register: ec2_instances_output
      when: action == "create"

    - name: print the ec2_instance_output
      ansible.builtin.debug:
        msg: "{{ ec2_instances_output }}"
      when: action == "create"

    - name: delete aws ec2 instances
      amazon.aws.ec2_instance:
        state: absent
        name: "{{ item }}-{{ instances_env }}"
        wait: false
      loop: "{{ ec2_intances_names }}"
      when: action=="destroy"
    