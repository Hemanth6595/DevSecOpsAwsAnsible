- name: route53 records
  hosts: all
  connection: local
  

  vars:
    instances_env: dev
    domain_name: devsecopsaws88s.online
    route53_action_mode: create
    ec2_intances_names: 
      - mongodb
      - mysql
      - redis
      - rabbitmq
      - catalogue
      - user
      - cart
      - shipping
      - payment
      - frontend

  tasks:
    - name: Read file
      slurp:
        src: ec2_output.json
      register: ec2_instances_output_json_file

    - name: Convert ec2 instances output JSON to variable
      set_fact:
        ec2_instances_Details: "{{ ec2_instances_output_json_file.content | b64decode | from_json }}"

    - name: Access values
      debug:
        msg: "{{ ec2_instances_Details.results }}" 
    

    - name: create rout53 records 
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ instances_env }}.{{ domain_name }}" # mongodb-dev.devsecopsaws88s.online, catalogue-dev.devsecopsaws88s.online
        type: A
        ttl: 1
        value: "{{item.instances[0].private_ip_address}}" # List
        wait: true
      loop: "{{ ec2_instances_Details.results }}"
      when: route53_action == "create"

    - name: create rout53 records for frontend
      amazon.aws.route53:
          state: present
          zone: "{{ domain_name }}"
          record: "roboshop-{{ instances_env }}.{{ domain_name }}" # roboshop-dev.devsecopsaws88s.online
          type: A
          ttl: 1
          value: "{{item.instances[0].public_ip_address}}"
          wait: true
      loop: "{{ ec2_instances_Details.results }}"
      when: 
        - item.item == "frontend"
        - route53_action == "create"

    - name: delete aws route 53 records
      amazon.aws.route53:
        state: absent   
        zone: "{{ domain_name }}"  
        record: "{{ item }}-{{ instances_env }}.{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ ec2_intances_names }}"
      when: route53_action == "destroy"


    - name: print the rout53
      debug:
       msg: "{{ item }}-{{ instances_env }}.{{ domain_name }}"
      loop: "{{ ec2_intances_names }}"
      when: route53_action == "destroy"

 


 