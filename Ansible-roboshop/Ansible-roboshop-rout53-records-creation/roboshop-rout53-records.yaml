- name: route53 records
  hosts: all
  connection: local

  vars:
    instances_env: dev
    domain_name: devsecopsaws88s.online
  
  tasks:
    - name: Read file
      slurp:
        src: ec2_output.json
      register: json_file

    

    - name: Access values
      ansible.builtin.debug:
        msg: json_file
    

    
 