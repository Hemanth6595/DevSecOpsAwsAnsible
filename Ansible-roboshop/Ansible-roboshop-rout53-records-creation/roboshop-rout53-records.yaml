- name: route53 records
  hosts: all
  connection: local

  vars:
    instances_env: dev
    domain_name: devsecopsaws88s.online
    action: create

  tasks:
    - name: Fetch EC2 instance info
      amazon.aws.ec2_instance_info:
        region: us-east-1
      register: ec2_output

    - name: Print EC2 info
      ansible.builtin.debug:
       msg:"{{ ec2_output.instances }}"
    

    


 