- name: configure catalogue
  hosts: catalogue
  become: yes
  tasks:
    - name: pign the web server
      ansible.builtin.ping:
      
    - name: disable nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable  nodejs
      ansible.builtin.command: dnf module enable nodejs:20 -y
      
    - name: Install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Create a directory if it does not exist
      ansible.builtin.file:
        path: /app
        state: directory
    
    - name: Add the user 'johnd' with a specific uid and a primary group of 'admin'
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"
        
    - name: Downloading the catalogue in tmp/catalogue.zip
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
        dest: /tmp/catalogue.zip
 
    - name: unzipping & unarchive the catalogue in /app from /tmp/catalogue.zip
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app  
        remote_src: yes

    - name: adding npm dependencies to package.nodejs that in /app directory
      community.general.npm:
        path: /app

    - name: Copy catalogue service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service
      
    - name: Copy mongo repo
      ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: Install mongodb client
      ansible.builtin.dnf:
       name: mongodb-mongosh
       state: present

    - name: check products loaded
      ansible.builtin.shell: >
        mongosh --host "{{ MONGODB_HOST }}" --quiet --eval
        "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: print the products
      ansible.builtin.debug:
       msg: catalogue_output




   

   
       
