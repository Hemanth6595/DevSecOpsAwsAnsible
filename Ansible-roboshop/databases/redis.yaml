- name: configuring redis
  hosts: redis
  become: yes
  tasks:
    - name: ping the redis server
      ansible.builtin.ping:

    - name: disabel the default redis
      ansible.builtin.command: dnf module disable redis -y
    
    - name : enabling the  redis:7
      ansible.builtin.shell: dnf module enable redis:7

    - name: Install redis:7
      ansible.builtin.dnf:
        name: redis
        state: present
        enabled: yes

    - name: allow connections
      ansible.builtin.replace:
        path: /etc/redis/redis.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'
    
    - name: disable protected mode
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: 'protected-mode'
        line: 'protected-mode no'     

    - name: start and enable the redis service
      ansible.builtin.service:
        name: redis
        state: restarted
        enabled: yes




